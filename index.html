<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dev.svg" />
    <link href="/src/index.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>QuanVA's Portfolio - Frontend Developer</title>
    <meta
      name="description"
      content="Portfolio của Văn Anh Quân - Frontend Developer với kinh nghiệm trong React, React Native, và các công nghệ web hiện đại."
    />
    <meta
      name="keywords"
      content="portfolio, frontend developer, react, react native, javascript, web development, Văn Anh Quân"
    />
    <meta name="author" content="Văn Anh Quân" />

    <!-- Open Graph Meta Tags (Facebook, LinkedIn, etc.) -->
    <meta
      property="og:title"
      content="QuanVA's Portfolio - Frontend Developer"
    />
    <meta
      property="og:description"
      content="Portfolio của Văn Anh Quân - Frontend Developer với kinh nghiệm trong React, React Native, và các công nghệ web hiện đại."
    />
    <meta property="og:image" content="https://quanva-portfolio.vercel.app/og-image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:url" content="https://quanva-portfolio.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QuanVA's Portfolio" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="QuanVA's Portfolio - Frontend Developer"
    />
    <meta
      name="twitter:description"
      content="Portfolio của Văn Anh Quân - Frontend Developer với kinh nghiệm trong React, React Native, và các công nghệ web hiện đại."
    />
    <meta name="twitter:image" content="https://quanva-portfolio.vercel.app/og-image.webp" />

    <!-- Additional SEO Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://quanva-portfolio.vercel.app/" />
    <!-- Preload hero avatar so it's ready before first paint -->
    <link rel="preload" as="image" href="/wuan.svg" fetchpriority="high" />

    <!-- JSON-LD Person schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Văn Anh Quân",
      "alternateName": "QuanVA",
      "url": "https://quanva-portfolio.vercel.app",
      "image": "https://quanva-portfolio.vercel.app/og-image.webp",
      "jobTitle": "Frontend Developer",
      "worksFor": { "@type": "Organization", "name": "Freelance" },
      "sameAs": [
        "https://github.com/quanva2003",
        "https://www.linkedin.com/in/[your-linkedin]"
      ],
      "knowsAbout": ["React", "TypeScript", "React Native", "Next.js"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

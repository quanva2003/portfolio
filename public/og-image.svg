  <rect x="338" y="342" width="142" height="32" rx="16" fill="#1e293b"/>
  <rect x="338" y="342" width="142" height="32" rx="16" stroke="#334155" stroke-width="1" fill="none"/>
  <text x="409" y="363" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"

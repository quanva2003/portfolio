  <circle cx="792" cy="159" r="6" fill="#ef4444" fill-opacity="0.85"/>
  <circle cx="812" cy="159" r="6" fill="#f59e0b" fill-opacity="0.85"/>
  <circle cx="832" cy="159" r="6" fill="#22c55e" fill-opacity="0.85"/>

  <!-- Code lines -->
  <text x="784" y="210" font-family="'Courier New', monospace" font-size="14.5" fill="#64748b">const </text>
  <text x="826" y="210" font-family="'Courier New', monospace" font-size="14.5" fill="#e2e8f0">developer</text>
  <text x="921" y="210" font-family="'Courier New', monospace" font-size="14.5" fill="#64748b"> = {</text>

  <text x="784" y="234" font-family="'Courier New', monospace" font-size="14.5" fill="#7dd3fc">  name</text>
  <text x="830" y="234" font-family="'Courier New', monospace" font-size="14.5" fill="#94a3b8">: </text>
  <text x="845" y="234" font-family="'Courier New', monospace" font-size="14.5" fill="#86efac">"QuanVA",</text>

  <text x="784" y="258" font-family="'Courier New', monospace" font-size="14.5" fill="#7dd3fc">  role</text>
  <text x="821" y="258" font-family="'Courier New', monospace" font-size="14.5" fill="#94a3b8">: </text>
  <text x="836" y="258" font-family="'Courier New', monospace" font-size="14.5" fill="#86efac">"Frontend Dev",</text>

  <text x="784" y="282" font-family="'Courier New', monospace" font-size="14.5" fill="#7dd3fc">  stack</text>
  <text x="830" y="282" font-family="'Courier New', monospace" font-size="14.5" fill="#94a3b8">: [</text>

  <text x="784" y="306" font-family="'Courier New', monospace" font-size="14.5" fill="#86efac">    "React",</text>
  <text x="784" y="330" font-family="'Courier New', monospace" font-size="14.5" fill="#86efac">    "TypeScript",</text>
  <text x="784" y="354" font-family="'Courier New', monospace" font-size="14.5" fill="#86efac">    "Vite"</text>

  <text x="784" y="378" font-family="'Courier New', monospace" font-size="14.5" fill="#94a3b8">  ]</text>
  <text x="784" y="402" font-family="'Courier New', monospace" font-size="14.5" fill="#94a3b8">}</text>

  <!-- Blinking cursor -->
  <rect x="800" y="390" width="9" height="17" rx="1" fill="#7c3aed" fill-opacity="0.9"/>

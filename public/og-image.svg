  <rect x="112" y="424" width="180" height="28" rx="14" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1" fill="none"/>
  <circle cx="130" cy="438" r="4" fill="#22c55e"/>
  <text x="143" y="443" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"

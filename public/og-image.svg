    <circle cx="760" cy="220" r="1.5"/><circle cx="820" cy="220" r="1.5"/><circle cx="880" cy="220" r="1.5"/><circle cx="940" cy="220" r="1.5"/><circle cx="1000" cy="220" r="1.5"/><circle cx="1060" cy="220" r="1.5"/><circle cx="1120" cy="220" r="1.5"/>
    <circle cx="760" cy="280" r="1.5"/><circle cx="820" cy="280" r="1.5"/><circle cx="880" cy="280" r="1.5"/><circle cx="940" cy="280" r="1.5"/><circle cx="1000" cy="280" r="1.5"/><circle cx="1060" cy="280" r="1.5"/><circle cx="1120" cy="280" r="1.5"/>
    <circle cx="760" cy="340" r="1.5"/><circle cx="820" cy="340" r="1.5"/><circle cx="880" cy="340" r="1.5"/><circle cx="940" cy="340" r="1.5"/><circle cx="1000" cy="340" r="1.5"/><circle cx="1060" cy="340" r="1.5"/><circle cx="1120" cy="340" r="1.5"/>
    <circle cx="760" cy="400" r="1.5"/><circle cx="820" cy="400" r="1.5"/><circle cx="880" cy="400" r="1.5"/><circle cx="940" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1060" cy="400" r="1.5"/><circle cx="1120" cy="400" r="1.5"/>
    <circle cx="760" cy="460" r="1.5"/><circle cx="820" cy="460" r="1.5"/><circle cx="880" cy="460" r="1.5"/><circle cx="940" cy="460" r="1.5"/><circle cx="1000" cy="460" r="1.5"/><circle cx="1060" cy="460" r="1.5"/><circle cx="1120" cy="460" r="1.5"/>
